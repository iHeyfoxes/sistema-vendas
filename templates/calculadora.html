{% extends "base.html" %}
{% block conteudo %}
<h2 style="color: #2c3e50; margin-bottom: 25px;">🧮 Calculadora de Preço de Venda</h2>

<div style="max-width: 600px; background: white; border: 1px solid #eee; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Use esta ferramenta para descobrir quanto cobrar por cada peça baseando-se no seu tempo e material.</p>

    <div style="margin-bottom: 15px;">
        <label style="display:block; font-size: 14px; color: #2c3e50; font-weight: 600; margin-bottom: 8px;">Custo do Material (Linhas, enchimento, olhos...)</label>
        <input type="number" id="material" placeholder="R$ 0,00" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px; font-size: 16px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label style="display:block; font-size: 14px; color: #2c3e50; font-weight: 600; margin-bottom: 8px;">Horas Trabalhadas</label>
        <input type="number" id="horas" placeholder="Ex: 5" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px; font-size: 16px;">
    </div>

    <div style="margin-bottom: 25px;">
        <label style="display:block; font-size: 14px; color: #2c3e50; font-weight: 600; margin-bottom: 8px;">Valor da sua Hora (R$)</label>
        <input type="number" id="valorHora" placeholder="Ex: 15" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px; font-size: 16px;">
    </div>

    <button onclick="calcular()" style="width: 100%; background: #2c3e50; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;">Calcular Preço Sugerido</button>

    <div id="resultado" style="display: none; margin-top: 30px; padding: 20px; background: #f0fff4; border: 1px solid #c6f6d5; border-radius: 10px; text-align: center;">
        <span style="color: #27ae60; font-weight: bold;">Preço de Venda Sugerido:</span>
        <h2 id="precoFinal" style="color: #27ae60; margin: 10px 0;">R$ 0,00</h2>
    </div>
</div>

<script>
function calcular() {
    const mat = parseFloat(document.getElementById('material').value) || 0;
    const hrs = parseFloat(document.getElementById('horas').value) || 0;
    const vHr = parseFloat(document.getElementById('valorHora').value) || 0;

    const total = mat + (hrs * vHr);

    document.getElementById('precoFinal').innerText = 'R$ ' + total.toFixed(2);
    document.getElementById('resultado').style.display = 'block';
}
</script>
{% endblock %}
