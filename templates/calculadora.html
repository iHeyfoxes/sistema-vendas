<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Amigurumi Manager</title>
    <style>
        :root {
            --primary: #2a5298;
            --secondary: #4dc0b5;
            --bg: #f0f4f8;
            --card: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            background: white;
            padding: 25px 0;
            box-shadow: 0 2px 15px rgba(0,0,0,0.04);
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
        }

        .main-wrapper {
            width: 95%;
            max-width: 600px;
            margin-bottom: 50px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding: 10px;
        }

        .nav-tabs a {
            text-decoration: none;
            padding: 14px 28px;
            background: white;
            border-radius: 50px;
            color: #5d6d7e;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-tabs a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(42, 82, 152, 0.25);
        }

        .content-card {
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--shadow);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4f5b76;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #e1e8f0;
            border-radius: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4dc0b5 0%, #3ca194 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(61, 191, 180, 0.2);
            transition: 0.3s;
        }

        .btn-main:hover { transform: scale(1.02); }

        #resultado-caixa {
            display: none;
            margin-top: 35px;
            padding: 30px;
            background: #f0fdf4;
            border-radius: 24px;
            border: 1px solid #dcfce7;
            text-align: center;
        }

        #precoFinal {
            font-size: 48px;
            color: #166534;
            font-weight: 800;
            display: block;
            margin: 10px 0;
        }
        .nav-tabs a:hover {
    transform: translateY(-3px); /* Faz o botão flutuar */
    background-color: #f8fafc;
}
    </style>
</head>
<body>
    <header class="header">
        <h1>🧶 Amigurumi Manager</h1>
    </header>

    <main class="main-wrapper">
        <nav class="nav-tabs">
            <a href="/">📊 Vendas</a>
            <a href="/encomendas">📦 Pedidos</a>
            <a href="/financeiro">💰 Lucro</a>
            <a href="/calculadora" class="active">🧮 Preço</a>
            <a href="/ajuda">📖 Ajuda</a>
        </nav>

        <div class="content-card">
            <h2 style="text-align: center; color: var(--primary); margin-bottom: 30px;">Calculadora Técnica</h2>

            <label>Custo de Material Usado (R$)</label>
            <input type="number" id="mat" placeholder="Ex: 12.50">

            <label>Horas de Trabalho Gastas</label>
            <input type="number" id="horas" placeholder="Ex: 4">

            <label>Valor da Sua Hora (R$)</label>
            <input type="number" id="valorHora" placeholder="Ex: 10.00">

            <button class="btn-main" onclick="calcular()">Calcular Preço de Venda</button>

            <div id="resultado-caixa">
                <span style="color: #166534; font-weight: 600;">Preço Mínimo Sugerido:</span>
                <span id="precoFinal">R$ 0.00</span>
                <p style="font-size: 13px; color: #666; margin: 0;">
                    Cálculo: (Material + Mão de Obra) + 20% de lucro.
                </p>
            </div>
        </div>
    </main>

    <script>
        function calcular() {
            let mat = parseFloat(document.getElementById('mat').value) || 0;
            let horas = parseFloat(document.getElementById('horas').value) || 0;
            let valorH = parseFloat(document.getElementById('valorHora').value) || 0;

            let total = (mat + (horas * valorH)) * 1.2;

            document.getElementById('precoFinal').innerText = "R$ " + total.toFixed(2);
            document.getElementById('resultado-caixa').style.display = 'block';
        }
    </script>
</body>
</html>
