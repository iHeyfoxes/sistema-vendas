<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Vendas</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 500px;
            margin: auto;
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .btn-salvar {
            background: #4CAF50;
        }

        .btn-listar {
            background: #2196F3;
        }

        .btn-excluir {
            background: #f44336;
        }

        .menu {
            margin-bottom: 15px;
        }

        .menu a {
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
        }

        .total {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>📊 Sistema de Vendas</h2>

    <div class="menu">
        <a href="/">Registrar Venda</a>
        <a href="/encomendas">Encomendas</a>
    </div>

    <h3>Nova Venda</h3>

    <form method="POST">
        <input name="cliente" placeholder="Cliente" required>
        <input name="produto" placeholder="Produto" required>
        <input name="valor" placeholder="Valor" required>
        <button class="btn-salvar" type="submit">Salvar Venda</button>
    </form>

    <h3>Vendas</h3>

    <ul>
    {% for v in vendas %}
    <li>
        {{v.data}} <br>
        Cliente: {{v.cliente}} <br>
        Produto: {{v.produto}} <br>
        Valor: R$ {{v.valor}} <br>

        <a href="/excluir_venda/{{loop.index0}}">
            <button class="btn-excluir">Excluir</button>
        </a>
    </li>
{% endfor %}
    </ul>

    <div class="total">
        Total: R$ {{total}}
    </div>

</div>

</body>
</html>
