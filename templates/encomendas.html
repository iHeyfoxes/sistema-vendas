{% extends "base.html" %}
{% block conteudo %}
<h2 style="color: #2c3e50; margin-bottom: 25px;">📦 Gestão de Encomendas</h2>

<div style="background: #f8f9fa; padding: 25px; border-radius: 12px; margin-bottom: 30px; border-left: 5px solid #4facfe;">
    <h4 style="margin-top: 0; color: #2c3e50;">Nova Encomenda</h4>
    <form method="POST" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end;">
        <div>
            <label style="display:block; font-size: 12px; color: #666; margin-bottom: 5px;">Cliente</label>
            <input type="text" name="cliente" placeholder="Quem pediu?" style="width:100%; padding:10px; border:1px solid #ddd; border-radius: 6px;" required>
        </div>
        <div>
            <label style="display:block; font-size: 12px; color: #666; margin-bottom: 5px;">O que é? (Item)</label>
            <input type="text" name="item" placeholder="Ex: Girafa de crochê" style="width:100%; padding:10px; border:1px solid #ddd; border-radius: 6px;" required>
        </div>
        <div>
            <label style="display:block; font-size: 12px; color: #666; margin-bottom: 5px;">Prazo de Entrega</label>
            <input type="text" name="prazo" placeholder="Ex: 20 de Maio" style="width:100%; padding:10px; border:1px solid #ddd; border-radius: 6px;" required>
        </div>
        <button type="submit" style="background: #4facfe; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold;">Agendar</button>
    </form>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    {% for encomenda in encomendas %}
    <div style="background: white; border: 1px solid #eee; padding: 20px; border-radius: 12px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
        <span style="font-size: 11px; color: #4facfe; font-weight: bold; text-transform: uppercase;">Encomenda #{{ encomenda.id }}</span>
        <h3 style="margin: 10px 0 5px 0; color: #2c3e50;">{{ encomenda.item }}</h3>
        <p style="margin: 0; color: #7f8c8d; font-size: 14px;"><b>Cliente:</b> {{ encomenda.cliente }}</p>
        <p style="margin: 10px 0 0 0; color: #e67e22; font-size: 14px;"><b>📅 Prazo:</b> {{ encomenda.prazo }}</p>

        <form action="/excluir_encomenda/{{ encomenda.id }}" method="POST" style="position: absolute; top: 15px; right: 15px;">
            <button style="background: none; border: none; color: #bdc3c7; cursor: pointer; font-size: 16px;">✕</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endblock %}
