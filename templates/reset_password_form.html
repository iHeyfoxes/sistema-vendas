{% extends "base.html" %}

{% block conteudo %}

<style>
.reset-container {
    max-width: 400px;
    margin: 40px auto;
}

.reset-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.08);
    text-align: center;
}

.reset-card h2 {
    margin-bottom: 10px;
}

.reset-card p {
    color: #777;
    font-size: 14px;
    margin-bottom: 20px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
}

.input-group input:focus {
    border-color: #3498db;
    box-shadow: 0 0 0 2px rgba(52,152,219,0.2);
}

/* botão olho */
.toggle-password {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
    font-size: 14px;
    color: #555;
}

.btn-reset {
    width: 100%;
    padding: 12px;
    background: #2ecc71;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn-reset:hover {
    background: #27ae60;
}

.flash-message {
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
}

.flash-error {
    background: #ffe5e5;
    color: #c0392b;
}

.flash-success {
    background: #eafaf1;
    color: #27ae60;
}
</style>

<div class="reset-container">
    <div class="reset-card">

        <h2>🔑 Nova senha</h2>
        <p>Digite sua nova senha abaixo</p>

        <!-- mensagens -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash-message flash-error">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="input-group">
                <input type="password" name="nova_senha" id="senha" placeholder="Nova senha" required>
                <input type="password" name="confirmar_senha" placeholder="Confirmar senha" required>
                <span class="toggle-password" onclick="toggleSenha()">👁️</span>
            </div>

            <button type="submit" class="btn-reset">
                Alterar senha
            </button>

        </form>

    </div>
</div>

<script>
function toggleSenha() {
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

{% endblock %}
