<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Amigurumi Pro</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#2c3e50">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #2c3e50;
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
    z-index: 1000;

    overflow-y: auto; /* 🔥 permite rolar o menu */
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

/* HEADER */
.sidebar-header {
    padding: 25px 20px 20px 20px;
    font-weight: bold;
    background: #1a252f;
}

/* MENU */
.sidebar-menu a {
    display: block;
    padding: 15px;
    color: #bdc3c7;
    text-decoration: none;
}

.sidebar-menu a:hover {
    background: #34495e;
    color: white;
}

/* CONTEÚDO */
.main-content {
    margin-left: 220px; /* 👈 ESSA LINHA RESOLVE O PROBLEMA */
    padding: 20px;
    transition: 0.3s;
}

/* BOTÃO MENU */
.toggle-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 1100;
    background: #1a252f;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 5px;
    cursor: pointer;
}

/* CAIXA */
.container-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* BOTÃO INSTALAR */
#installBtn {
    display: none;
    padding: 10px;
    margin: 10px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
}

/* MOBILE */
@media (max-width: 768px) {

    .sidebar {
        left: -260px;
        width: 260px;
        padding-top: 60px; /* 🔥 evita botão ☰ cobrir "Amigurumi" */
    }

    .sidebar.open {
        left: 0;
    }

}
</style>
</head>

<body>

<!-- BOTÃO INSTALAR -->
<button id="installBtn">📲 Instalar App</button>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';

    btn.onclick = () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();

        deferredPrompt.userChoice.then((choiceResult) => {
            deferredPrompt = null;
        });
    };
});
</script>

<!-- BOTÃO MENU -->
<button class="toggle-btn" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">🧶 Amigurumi</div>

    <div class="sidebar-menu">
        <a href="/">📊 Vendas</a>
        <a href="/encomendas">📦 Pedidos</a>
        <a href="/financeiro">💰 Financeiro</a>
        <a href="/receitas">🍰 Receitas</a>
        <a href="/precos">🏷️ Preços</a>
        <a href="/calculadora">🧮 Calculadora</a>
        <a href="/perfil">⚙️ Perfil</a>
    </div>

    <div style="margin-top:auto">
        <a href="/ajuda" style="padding:15px;display:block;color:#f1c40f;">❓ Ajuda</a>
        <a href="/logout" style="padding:15px;display:block;background:#e74c3c;color:white;text-decoration:none;">Sair</a>
    </div>
</div>

<!-- CONTEÚDO -->
<div class="main-content" id="content">
    <div class="container-box">
        {% block conteudo %}{% endblock %}
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('open');
}

// 🔥 FECHAR AO CLICAR FORA
document.addEventListener('click', function (event) {
    const sidebar = document.getElementById('sidebar');
    const button = document.querySelector('.toggle-btn');

    const isClickInsideSidebar = sidebar.contains(event.target);
    const isClickOnButton = button.contains(event.target);

    if (!isClickInsideSidebar && !isClickOnButton) {
        sidebar.classList.remove('open');
    }
});
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
