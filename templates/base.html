<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Amigurumi Pro</title>

<style>

/* ===== RESET ===== */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f5f9;
}

/* ===== TOPBAR ===== */
.topbar {
    height: 56px;
    background: #0f172a;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 12px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 2000;
}

.menu-btn {
    font-size: 24px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    margin-right: 10px;
}

/* ===== OVERLAY ===== */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 1500;
}

/* ===== SIDEBAR (MOBILE FIRST) ===== */
.sidebar {
    position: fixed;
    top: 0;
    left: -270px;
    width: 270px;
    height: 100vh;
    background: #1e293b;
    color: white;
    display: flex;
    flex-direction: column;
    transition: 0.25s ease;
    z-index: 1600;
}

/* ABERTO */
.sidebar.open {
    left: 0;
}

/* HEADER */
.sidebar-header {
    padding: 18px;
    font-weight: bold;
    background: #0f172a;
}

/* MENU */
.nav {
    flex: 1;
    overflow-y: auto;
}

.nav a {
    display: block;
    padding: 14px 16px;
    color: #cbd5e1;
    text-decoration: none;
}

.nav a:hover {
    background: #334155;
    color: white;
}

/* FOOTER */
.footer {
    border-top: 1px solid #334155;
}

.footer a {
    display: block;
    padding: 14px 16px;
    text-decoration: none;
}

.footer .help {
    color: #facc15;
}

.footer .logout {
    background: #ef4444;
    color: white;
}

/* ===== CONTEÚDO ===== */
.content {
    margin-top: 56px;
    padding: 16px;
}

/* ===== DESKTOP (continua mobile-first) ===== */
@media (min-width: 769px) {

    .content {
        padding: 24px;
    }
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <span>🧶 Amigurumi Pro</span>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-header">Menu</div>

    <div class="nav">
        <a href="/">📊 Vendas</a>
        <a href="/encomendas">📦 Pedidos</a>
        <a href="/financeiro">💰 Financeiro</a>
        <a href="/receitas">🍰 Receitas</a>
        <a href="/precos">🏷️ Preços</a>
        <a href="/calculadora">🧮 Calculadora</a>
        <a href="/perfil">⚙️ Perfil</a>
    </div>

    <div class="footer">
        <a href="/ajuda" class="help">❓ Ajuda</a>
        <a href="/logout" class="logout">🚪 Sair</a>
    </div>

</div>

<!-- CONTEÚDO -->
<div class="content">
    <div class="card">
        {% block conteudo %}{% endblock %}
    </div>
</div>

<!-- JS SIMPLES E ESTÁVEL -->
<script>

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const btn = document.getElementById("menuBtn");

function openMenu() {
    sidebar.classList.add("open");
    overlay.style.display = "block";
}

function closeMenu() {
    sidebar.classList.remove("open");
    overlay.style.display = "none";
}

btn.addEventListener("click", () => {
    if (sidebar.classList.contains("open")) {
        closeMenu();
    } else {
        openMenu();
    }
});

overlay.addEventListener("click", closeMenu);

</script>

</body>
</html>
