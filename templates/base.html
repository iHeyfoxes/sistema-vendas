<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Amigurumi Pro</title>

    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#2c3e50">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #2c3e50;
    color: white;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
}

/* HEADER */
.sidebar-header {
    padding: 20px 20px 20px 60px;
    font-weight: bold;
    background: #1a252f;
}

/* LINKS */
.sidebar-menu a {
    display: block;
    padding: 15px;
    color: #bdc3c7;
    text-decoration: none;
}

.sidebar-menu a:hover {
    background: #34495e;
    color: white;
}

/* CONTEÚDO */
.main-content {
    flex: 1;
    padding: 20px;
    transition: 0.3s;
}
/* BOTÃO */
.toggle-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 999;
    background: #1a252f;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 5px;
    cursor: pointer;
}

/* CAIXA */
.container-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

@media (max-width: 768px) {

    .sidebar {
        width: 260px;
        left: -260px;
    }

    .sidebar.open {
        left: 0;
    }

    .main-content {
        margin-left: 0 !important;
        padding: 15px;
    }

}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">🧶 Amigurumi</div>

    <div class="sidebar-menu">
        <a href="/">📊 Vendas</a>
        <a href="/encomendas">📦 Pedidos</a>
        <a href="/financeiro">💰 Financeiro</a>
        <a href="/receitas">🍰 Receitas</a>
        <a href="/precos">🏷️ Preços</a>
        <a href="/calculadora">🧮 Calculadora</a>
        <a href="/perfil">⚙️ Perfil</a>
    </div>

    <div style="margin-top:auto">
        <a href="/ajuda" style="padding:15px;display:block;color:#f1c40f;">❓ Ajuda</a>
        <a href="/logout" style="padding:15px;display:block;background:#e74c3c;color:white;text-decoration:none;">Sair</a>
    </div>
</div>

<div class="main-content" id="content">
    <div class="container-box">
        {% block conteudo %}{% endblock %}
    </div>
</div>

<script>
function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
}
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
    .then(() => console.log('Service Worker registrado'));
}
</script>

</body>
</html>
